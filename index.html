<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Audiobook" />
  <meta name="theme-color" content="#5b5bd6" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>PDF Audiobook</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Upload screen -->
  <main id="upload-screen" class="screen">
    <div class="hero">
      <div class="logo">
        <svg viewBox="0 0 512 512" width="96" height="96" aria-hidden="true">
          <rect width="512" height="512" rx="96" fill="#5b5bd6"/>
          <polygon points="196,224 256,224 256,288 196,288" fill="#fff"/>
          <polygon points="256,224 322,188 322,324 256,288" fill="#fff"/>
          <path d="M340 196 q40 60 0 120" stroke="#fff" stroke-width="18" fill="none" stroke-linecap="round"/>
          <path d="M372 168 q64 88 0 176" stroke="#fff" stroke-width="18" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>PDF Audiobook</h1>
      <p class="sub">Turn any PDF into a spoken book. Pick a file and press play.</p>

      <label id="upload-btn" class="big-btn" for="file-input">
        <span>Choose a PDF</span>
      </label>
      <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />

      <div id="upload-status" class="status" role="status" aria-live="polite"></div>

      <ul class="hints">
        <li>Works offline once added to Home Screen</li>
        <li>Remembers where you stopped</li>
        <li>Speed control &amp; 2 voices</li>
      </ul>
    </div>
  </main>

  <!-- Player screen -->
  <main id="player-screen" class="screen hidden">
    <header class="player-header">
      <button id="back-btn" class="icon-btn" title="Change book" aria-label="Change book">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 6h16v2H4zm0 5h16v2H4zm0 5h10v2H4z"/></svg>
      </button>
      <div class="title-wrap">
        <div id="book-title" class="book-title">—</div>
        <div id="book-meta" class="book-meta"></div>
      </div>
      <button id="remove-btn" class="icon-btn" title="Remove book" aria-label="Remove book">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M6 7h12v2H6zm1 3h10l-1 11H8zM9 4h6v2H9z"/></svg>
      </button>
    </header>

    <section class="reading">
      <div id="reading-view" class="reading-view" tabindex="0"></div>
    </section>

    <section class="progress">
      <input id="scrubber" type="range" min="0" max="0" value="0" step="1" aria-label="Position" />
      <div class="progress-meta">
        <span id="pos-label">0 / 0</span>
        <span id="page-label"></span>
      </div>
    </section>

    <section class="controls">
      <button id="prev-btn" class="ctrl" aria-label="Previous sentence">
        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="play-btn" class="ctrl play" aria-label="Play">
        <svg id="play-icon" viewBox="0 0 24 24" width="34" height="34"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" width="34" height="34"><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button id="next-btn" class="ctrl" aria-label="Next sentence">
        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
      </button>
    </section>

    <section class="settings">
      <div class="setting-row">
        <button id="rate-down" class="chip" aria-label="Slower">−</button>
        <div class="setting-val">
          <div class="setting-label">Speed</div>
          <div id="rate-val">1.0×</div>
        </div>
        <button id="rate-up" class="chip" aria-label="Faster">+</button>
      </div>
      <div class="setting-row">
        <button id="voice-btn" class="chip wide" aria-label="Change voice">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 3a4 4 0 0 0-4 4v5a4 4 0 0 0 8 0V7a4 4 0 0 0-4-4zM5 11v1a7 7 0 0 0 6 6.9V22h2v-3.1A7 7 0 0 0 19 12v-1"/></svg>
          <span id="voice-name">Voice</span>
        </button>
      </div>
      <div class="setting-row">
        <button id="timer-btn" class="chip wide" aria-label="Sleep timer">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm1-13h-2v6l5 3 1-1.7-4-2.3z"/></svg>
          <span id="timer-label">Sleep timer</span>
        </button>
      </div>
      <div class="setting-row">
        <button id="mode-btn" class="chip wide" aria-label="Playback mode">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm6 0h-2V8h2v8z"/></svg>
          <span id="mode-label">Natural voice</span>
        </button>
      </div>
    </section>

    <!-- Sleep timer popup -->
    <div id="timer-popup" class="popup hidden">
      <div class="popup-card">
        <div class="popup-title">Stop reading in…</div>
        <div class="timer-options">
          <button class="timer-opt" data-min="0">Off</button>
          <button class="timer-opt" data-min="5">5 min</button>
          <button class="timer-opt" data-min="10">10 min</button>
          <button class="timer-opt" data-min="15">15 min</button>
          <button class="timer-opt" data-min="20">20 min</button>
          <button class="timer-opt" data-min="30">30 min</button>
          <button class="timer-opt" data-min="45">45 min</button>
          <button class="timer-opt" data-min="60">1 hour</button>
        </div>
        <button id="timer-close" class="timer-cancel">Cancel</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>

  <!-- Hidden audio element for background TTS mode (required for iOS background audio) -->
  <audio id="bg-audio" preload="none" playsinline webkit-playsinline></audio>
</body>
</html>
